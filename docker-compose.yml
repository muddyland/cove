services:
  # WRITE-capable Docker proxy — used ONLY by the cove backend to create/stop
  # workspace containers. Reachable only on the internal cove-sockwrite network.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: cove-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - IMAGES=1
      - VOLUMES=1
      - EVENTS=1
      - INFO=1
      - VERSION=1
      - PING=1
      - POST=1
    networks:
      - cove-sockwrite

  # READ-ONLY Docker proxy — used ONLY by Traefik for service discovery. No POST,
  # so a Traefik compromise cannot create containers (no host-root pivot).
  docker-socket-proxy-ro:
    image: tecnativa/docker-socket-proxy:latest
    container_name: cove-socket-proxy-ro
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - EVENTS=1
      - INFO=1
      - VERSION=1
      - PING=1
      # POST defaults to 0 → read-only.
    networks:
      - cove-net

  traefik:
    image: traefik:v3.2
    container_name: cove-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://docker-socket-proxy-ro:2375
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=cove-net
      - --entrypoints.web.address=:80
      - --log.level=WARN
    ports:
      - "${COVE_HTTP_PORT:-80}:80"
    networks:
      - cove-net
    environment:
      # Force the Docker API version so the client skips negotiation through the
      # socket proxy (otherwise it can fall back to 1.24, which the daemon now
      # rejects). 1.41 is supported by Docker 20.10+.
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
    depends_on:
      - docker-socket-proxy-ro

  cove:
    build: .
    image: cove:local
    container_name: cove
    restart: unless-stopped
    depends_on:
      - traefik
      - docker-socket-proxy
    labels:
      - traefik.enable=true
      # Main app router (catch-all, lowest priority).
      - traefik.http.routers.cove.rule=PathPrefix(`/`)
      - traefik.http.routers.cove.entrypoints=web
      - traefik.http.routers.cove.priority=1
      - traefik.http.routers.cove.service=cove
      - traefik.http.routers.cove.middlewares=cove-headers
      - traefik.http.services.cove.loadbalancer.server.port=8080
      # Dedicated login router with rate limiting (higher priority).
      - traefik.http.routers.cove-login.rule=PathPrefix(`/api/auth/login`)
      - traefik.http.routers.cove-login.entrypoints=web
      - traefik.http.routers.cove-login.priority=100
      - traefik.http.routers.cove-login.service=cove
      - traefik.http.routers.cove-login.middlewares=cove-ratelimit,cove-headers
      # --- Middleware definitions (referenced by name elsewhere) ---
      # ForwardAuth: authenticates workspace streams (cove-auth@docker).
      - traefik.http.middlewares.cove-auth.forwardauth.address=http://cove:8080/api/auth/forward
      - traefik.http.middlewares.cove-auth.forwardauth.authResponseHeaders=X-Cove-User
      # Security headers (cove-headers@docker). No CSP (breaks webtop), no HSTS (HTTP local).
      - traefik.http.middlewares.cove-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.cove-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.cove-headers.headers.customResponseHeaders.X-Frame-Options=SAMEORIGIN
      - traefik.http.middlewares.cove-headers.headers.customResponseHeaders.X-Cove=1
      # Rate limit for login.
      - traefik.http.middlewares.cove-ratelimit.ratelimit.average=5
      - traefik.http.middlewares.cove-ratelimit.ratelimit.period=1m
      - traefik.http.middlewares.cove-ratelimit.ratelimit.burst=10
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts:ro
      # Workspace home dirs. The path MUST be identical on host and in the
      # container so that bind mounts the backend asks the Docker daemon to make
      # for workspace containers resolve to the same directory the file browser
      # reads. (Default: /var/lib/cove/workspaces.)
      - ${COVE_STORAGE_PATH:-/var/lib/cove/workspaces}:${COVE_STORAGE_PATH:-/var/lib/cove/workspaces}
    networks:
      - cove-net
      - cove-sockwrite
    environment:
      - COVE_DATA_DIR=/app/data
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
      - COVE_TRAEFIK_NETWORK=cove-net
      - COVE_TRAEFIK_CONTAINER=cove-traefik
      - COVE_WORKSPACE_TZ=${TZ:-UTC}
      - COVE_STORAGE_PATH=${COVE_STORAGE_PATH:-/var/lib/cove/workspaces}
      - COVE_COOKIE_SECURE=${COVE_COOKIE_SECURE:-false}
      # Only Traefik can reach cove:8080 (cove-net), so trust its forwarded
      # headers; the app also reads the real client from the rightmost XFF hop.
      - FORWARDED_ALLOW_IPS=*
      # Per-workspace subdomain isolation (optional). When COVE_WORKSPACE_DOMAIN
      # is set, each workspace streams at {public_id}.{domain} (its own origin,
      # so it can't read the SPA's token); unset → subpath /workspace/{id}/.
      # Requires wildcard DNS + a wildcard TLS cert (see docker-compose.dns.yml)
      # and COVE_COOKIE_DOMAIN set to a shared parent so the session cookie
      # reaches the subdomains.
      - COVE_WORKSPACE_DOMAIN=${COVE_WORKSPACE_DOMAIN:-}
      - COVE_COOKIE_DOMAIN=${COVE_COOKIE_DOMAIN:-}
      # OIDC (optional — remove if not using)
      # - COVE_OIDC_ISSUER=https://auth.example.com/application/o/cove/
      # - COVE_OIDC_CLIENT_ID=your-client-id
      # - COVE_OIDC_CLIENT_SECRET=your-client-secret
      # - COVE_OIDC_ADMIN_GROUP=cove-admins
      # - COVE_OIDC_PROVIDER_NAME=Authentik

networks:
  # Per-workspace networks are created at runtime by the backend; not declared here.
  cove-net:
    name: cove-net
    driver: bridge
  # Backend ↔ write-proxy only; no external connectivity.
  cove-sockwrite:
    name: cove-sockwrite
    driver: bridge
    internal: true
