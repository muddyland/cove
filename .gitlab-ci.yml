stages:
  - lint
  - test
  - build

# ── Shared bases ──────────────────────────────────────────────────────────

.python_base:
  image: python:3.12-slim
  tags: [saas-linux-small-amd64]
  before_script:
    - pip install --quiet -r backend/requirements.txt

.node_base:
  image: node:20-alpine
  tags: [saas-linux-small-amd64]
  before_script:
    - cd frontend && npm ci

# ── Lint ──────────────────────────────────────────────────────────────────

lint:backend:
  extends: .python_base
  stage: lint
  before_script:
    - pip install --quiet ruff
  script:
    - cd backend && ruff check server

lint:frontend:
  extends: .node_base
  stage: lint
  script:
    # No dedicated lint script; vue-tsc is the type-level lint.
    - npx vue-tsc --noEmit

# ── Test ──────────────────────────────────────────────────────────────────

test:backend:
  extends: .python_base
  stage: test
  script:
    # Import smoke test — fails fast on broken imports / wiring.
    - cd backend && python -c "import server.main; print('app import OK')"
    # Run the suite if one exists.
    - |
      if [ -d server/tests ] || [ -d tests ]; then
        pip install --quiet pytest
        pytest -q --tb=short
      else
        echo "no tests present — skipping pytest"
      fi

build:frontend:
  extends: .node_base
  stage: test
  script:
    - npm run build
  artifacts:
    paths: [frontend/dist]
    expire_in: 14 days

# ── Build ─────────────────────────────────────────────────────────────────

build:image:
  stage: build
  tags: [saas-linux-small-amd64]
  image: docker:24.0.5
  services: [docker:24.0.5-dind]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main"'
    - if: '$CI_COMMIT_TAG'
    - exists: [Dockerfile]
