stages:
  - lint
  - test
  - build

# ── Shared bases ──────────────────────────────────────────────────────────

.python_base:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/python:3.12-slim
  tags: [saas-linux-small-amd64]
  before_script:
    - pip install --quiet -r backend/requirements.txt

.node_base:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:20-alpine
  tags: [saas-linux-small-amd64]
  before_script:
    - cd frontend && npm ci

# ── Lint ──────────────────────────────────────────────────────────────────

lint:backend:
  extends: .python_base
  stage: lint
  before_script:
    - pip install --quiet ruff
  script:
    - cd backend && ruff check server

lint:frontend:
  extends: .node_base
  stage: lint
  script:
    # No dedicated lint script; vue-tsc is the type-level lint.
    - npx vue-tsc --noEmit

# ── Test ──────────────────────────────────────────────────────────────────

test:backend:
  extends: .python_base
  stage: test
  before_script:
    - pip install --quiet -r backend/requirements.txt pytest pytest-asyncio
  script:
    - cd backend
    # Import smoke test — fails fast on broken imports / wiring.
    - python -c "import server.main; print('app import OK')"
    - pytest -q --tb=short

test:frontend:
  extends: .node_base
  stage: test
  script:
    - npm test

build:frontend:
  extends: .node_base
  stage: test
  script:
    - npm run build
  artifacts:
    paths: [frontend/dist]
    expire_in: 14 days

# ── Build ─────────────────────────────────────────────────────────────────

build:image:
  stage: build
  tags: [saas-linux-small-amd64]
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:24.0.5
  services:
    - ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - until docker info; do sleep 1; done
    # Log the dind daemon in to the dependency proxy so the Dockerfile's FROM
    # base images (node, python) also pull through the cache, not Docker Hub.
    - docker login -u $CI_DEPENDENCY_PROXY_USER -p $CI_DEPENDENCY_PROXY_PASSWORD $CI_DEPENDENCY_PROXY_SERVER
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --build-arg BASE_REGISTRY=${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/ --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main"'
    - if: '$CI_COMMIT_TAG'
    - exists: [Dockerfile]
