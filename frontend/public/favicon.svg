<svg xmlns="http://www.w3.org/2000/svg" viewBox="190 55 300 300" role="img">
  <title>Cove</title>
  <defs>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fffff"/>
      <stop offset="1" stop-color="#0bb6cf"/>
    </linearGradient>
  </defs>

  <!-- Harbor arch — neon cyan frame with dark interior -->
  <path d="M215,105 Q215,75 245,75 L435,75 Q465,75 465,105 L465,310 Q465,335 440,335 L240,335 Q215,335 215,310 Z"
        fill="#00f5ff" filter="url(#neon)"/>
  <path d="M240,115 Q240,95 258,95 L422,95 Q440,95 440,115 L440,310 Q440,330 422,330 L258,330 Q240,330 240,310 Z"
        fill="#06060f"/>

  <!-- Container stack -->
  <rect x="268" y="155" width="145" height="78" rx="6" fill="#0c5a6b"/>
  <rect x="262" y="175" width="155" height="80" rx="6" fill="#13a0bd"/>
  <rect x="256" y="195" width="165" height="82" rx="6" fill="url(#cyan)"/>

  <!-- Screen / browser window -->
  <rect x="268" y="206" width="100" height="48" rx="3" fill="#06121a"/>
  <circle cx="278" cy="213" r="3" fill="#ff00aa"/>
  <circle cx="288" cy="213" r="3" fill="#ff00aa"/>
  <circle cx="298" cy="213" r="3" fill="#ff00aa"/>
  <rect x="275" y="220" width="80" height="6" rx="3" fill="#0bb6cf"/>
  <rect x="275" y="233" width="65" height="4" rx="2" fill="#0bb6cf"/>
  <rect x="275" y="241" width="50" height="4" rx="2" fill="#0bb6cf"/>

  <!-- Ephemeral "X" badge — magenta accent -->
  <circle cx="403" cy="207" r="11" fill="#ff00aa" filter="url(#neon)"/>
  <line x1="398" y1="202" x2="408" y2="212" stroke="#06060f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="408" y1="202" x2="398" y2="212" stroke="#06060f" stroke-width="2.5" stroke-linecap="round"/>
</svg>
